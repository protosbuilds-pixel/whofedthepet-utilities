<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Household | WhoFedThePet?!</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #111827;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 18px;
        color: #4b5563;
      }
      .code {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        margin: 10px 0 18px;
      }
      .btn {
        display: inline-block;
        border: 0;
        border-radius: 12px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }
      .btn-primary {
        background: #111827;
        color: #fff;
      }
      .btn-secondary {
        background: #fff;
        color: #111827;
        border: 1px solid #d1d5db;
        margin-left: 10px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Join household in WhoFedThePet?!</h1>
        <p id="subtitle">Opening the app…</p>
        <div class="code" id="code">-</div>
        <div class="row">
          <a class="btn btn-primary" id="openApp" href="#">Open App</a>
          <button class="btn btn-secondary" id="copyCode" type="button">Copy Code</button>
        </div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const rawCode = params.get("code") || "";
      const inviteCode = rawCode.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
      const schemeUrl = `whofedthepet://join/${encodeURIComponent(inviteCode)}`;

      const subtitle = document.getElementById("subtitle");
      const codeEl = document.getElementById("code");
      const openApp = document.getElementById("openApp");
      const copyCode = document.getElementById("copyCode");

      codeEl.textContent = inviteCode || "INVALID";
      openApp.href = schemeUrl;

      if (!inviteCode) {
        subtitle.textContent = "Invalid invite link. Ask for a new invite.";
        openApp.style.display = "none";
        copyCode.style.display = "none";
      } else {
        setTimeout(() => {
          window.location.href = schemeUrl;
        }, 120);
      }

      copyCode.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(inviteCode);
          copyCode.textContent = "Copied";
        } catch (error) {
          copyCode.textContent = "Copy failed";
        }
      });
    </script>
  </body>
</html>
